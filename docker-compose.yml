version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: fitsync_user
      POSTGRES_PASSWORD: fitsync_password
      POSTGRES_DB: fitsync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://fitsync_user:fitsync_password@db:5432/fitsync_db?schema=public
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-your_client_id}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-your_client_secret}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI:-http://localhost:3000/api/integrations/strava/callback}
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres_data:
